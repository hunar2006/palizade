stateDir: .palizade
policy: policies/default.yaml
lockfile: palizade.lock

audit:
  jsonl: .palizade/audit.jsonl
  sqlite: .palizade/audit.sqlite
  captureRawPayloads: false
  errorVerbosity: true

approvals:
  mode: localhost
  timeoutMs: 120000
  default: deny
  host: 127.0.0.1
  port: 32145
  openBrowser: true

detectors:
  heuristic: true
  promptGuard2:
    enabled: false
    model: sinatras/Llama-Prompt-Guard-2-86M-ONNX
    cacheDir: .palizade/models
    device: cpu
  secrets:
    enabled: false
  pii:
    enabled: false

egress:
  allowlist:
    hosts: []
    emails: []

transport:
  maxMessageBytes: 67108864
  maxBufferedBytes: 67108864
  allowBatches: false
  allowContentLength: false

taint:
  sqlite: .palizade/taint.sqlite
  keyPath: .palizade/taint.key
  scope: profile
  profileId: default
  ttlMs: 86400000
  suspiciousScore: 0.35
  fuzzyHammingMax: 7
  temporal:
    enabled: true
    turns: 3
    ttlMs: 300000
    detectorScoreGte: 0.55

servers:
  toy:
    command: node
    args:
      - examples/toy-mcp-server/server.mjs
    trust: untrusted
    toolClasses:
      read_web: source
      send_email: sink
      echo: pure
    sensitive: false
    sensitiveTools: {}
    sensitivePathPatterns: []
  claude_fetch_demo:
    command: node
    args:
      - examples/claude-code-fetch-server/server.mjs
    trust: untrusted
    toolClasses:
      fetch_url: source
      post_data: sink
    toolCapabilities:
      fetch_url:
        - reads_untrusted_content
      post_data:
        - network_egress
        - writes_remote
    sensitive: false
    sensitiveTools: {}
    sensitivePathPatterns: []
  filesystem:
    command: node
    args:
      - node_modules/@modelcontextprotocol/server-filesystem/dist/index.js
      - .
    trust: semi
    toolClasses:
      read_file: source
      read_text_file: source
      read_media_file: source
      read_multiple_files: source
      list_directory: source
      list_directory_with_sizes: source
      directory_tree: source
      search_files: source
      get_file_info: source
      list_allowed_directories: source
      write_file: sink
      edit_file: sink
      create_directory: sink
      move_file: sink
    sensitive: false
    sensitiveTools: {}
    sensitivePathPatterns: []
